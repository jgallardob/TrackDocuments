<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackDocuments</title>
    <!-- Se agrega Google Fonts para usar familia Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <!-- Vincula el CSS externo con Glassmorphism -->
    <link rel="stylesheet" href="/styles.css">
    
    <meta name="description" content="Plataforma de Data Loss Prevention con rastreo forense PDF y Zero Trust Architecture.">
</head>
<body>
    <div class="container">
        
        <header class="header" style="display: flex; justify-content: space-between; align-items: flex-start; width: 100%; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 1rem; margin-bottom: 2rem;">
            <div style="flex: 1;"></div>
            <div style="flex: 2; text-align: center;">
                <h1 style="margin-bottom: 0.2rem;">TrackDocuments</h1>
                <p style="margin-top: 0;">Data Loss Prevention & PDF Traceability</p>
            </div>
            <div style="flex: 1; text-align: right; padding-top: 0.5rem;">
                <button type="button" onclick="logout()" id="logoutBtn" style="display:none; background-color: rgba(255,50,50,0.1); border: 1px solid #ff3333; color: #ff3333; padding: 8px 16px; border-radius: 6px; font-size: 0.85rem; cursor: pointer; transition: all 0.2s;">Logout</button>
            </div>
        </header>

        <!-- Panel 1: Autenticación -->
        <main class="glass-panel auth-panel">
            <h2 style="display: flex; align-items: center; gap: 10px;">
                <svg viewBox="0 0 24 24" fill="#3b82f6" width="24" height="24" style="flex-shrink: 0;">
                    <path d="M12 17c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6-9h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM8.9 6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2H8.9V6zM18 20H6V10h12v10z"/>
                </svg>
                Control de Acceso 
                <span id="sessionStatus" class="status-indicator" title="Desconectado"></span>
            </h2>
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Usuario Identificador</label>
                    <input type="text" id="username" placeholder="Ingrese nombre de usuario" required autocomplete="username">
                </div>
                <div class="input-group">
                    <label for="password">Credencial de Pasmado</label>
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit">Autenticar Sesión Segura</button>
            </form>
            
            <div id="loggedInView" style="display:none; text-align: left; margin-top: 1rem;">
                <h3 style="color: #e2e8f0; margin-bottom: 1rem; font-size: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem;">Árbol de Auditoría de tus Subidas</h3>
                <div id="auditTree" style="font-size: 0.85rem; color: #94a3b8; max-height: 250px; overflow-y: auto;">
                    <p>No hay archivos subidos por ti.</p>
                </div>
            </div>
        </main>

        <!-- Panel 2: Boveda DLP -->
        <aside class="glass-panel vault-panel">
            <h2 style="display: flex; align-items: center; gap: 10px;">
                <svg viewBox="0 0 24 24" fill="#3b82f6" width="24" height="24" style="flex-shrink: 0;">
                    <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
                </svg>
                Gestión Forense
            </h2>
            
            <div id="vault-locked" style="text-align: center; color: #94a3b8; padding: 3rem 0;">
                <svg viewBox="0 0 24 24" fill="rgba(248, 81, 73, 0.2)" width="80" height="80" style="margin-bottom: 1rem;">
                    <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10z"/>
                </svg>
                <p style="font-weight: 600; color: #f85149; margin-top: 1rem; font-size: 1.2rem;">Acceso Restringido</p>
                <p style="font-size: 0.85rem; margin-top: 0.5rem;">Requiere autenticación activa para desbloquear la bóveda.</p>
            </div>

            <div id="vault-content" style="display:none;">
                <div class="input-group">
                    <label>Ingesta Segura al Vault</label>
                    <div class="file-upload-wrapper">
                        <input type="file" id="fileInput" accept="application/pdf">
                        <label for="fileInput" class="file-upload-label">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white">
                                <path d="M14 2H6C4.9 2 4 2.9 4 4V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V8L14 2ZM18 20H6V4H13V9H18V20ZM12 11L8 15H10.5V18H13.5V15H16L12 11Z"/>
                            </svg>
                            <span id="fileNameDisplay">Seleccionar documento PDF...</span>
                        </label>
                    </div>
                    <button onclick="uploadFile()" style="margin-top: 0.5rem;">Cifrar y Almacenar</button>
                </div>

                <div class="divider"></div>

                <div class="input-group">
                    <label>Registro de Archivos del Vault</label>
                    <div id="fileRegistry" style="max-height: 150px; overflow-y: auto; background-color: rgba(1, 4, 9, 0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 0.5rem;">
                        <span style="color: #94a3b8; font-size: 0.85rem; padding: 0.5rem; display: block;">Cargando registro...</span>
                    </div>
                </div>
            </div>
        </aside>

    </div>

    <!-- Toast Notification System -->
    <div id="toast" style="display:none; position:fixed; bottom:20px; right:20px; padding:1.2rem; border-radius:8px; background:rgba(30,41,59,0.8); border:1px solid rgba(255,255,255,0.1); backdrop-filter:blur(10px); z-index:1000; max-width:350px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <p id="toastMessage" style="color:#e2e8f0; font-size:0.9rem; margin:0; line-height: 1.4;"></p>
    </div>

    <script src="/app.js"></script>
</body>
</html>
